<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1025" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rol Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">
  <header class="main-header">
    <div class="header-inner">
      <button id="btn-back" aria-label="Volver">Volver</button>
      <h1 class="app-title">Rol <span>Tracker</span></h1>
      <div class="filter-bar">
        <select id="game-filter" aria-label="Filtrar por juego">
          <option value="all">Todos los juegos</option>
        </select>
      </div>
      <button class="btn-primary btn-sm" id="btn-add-character">+ Personaje</button>
    </div>
  </header>
  <main id="main-content" aria-live="polite"></main>
  <nav class="bottom-nav" aria-label="Navegación principal">
    <button class="nav-btn active" data-view="dashboard" aria-label="Urgentes">
      <span class="nav-icon">⏰</span>
      Urgentes
    </button>
    <button class="nav-btn" data-view="characters" aria-label="Personajes">
      <span class="nav-icon">🎭</span>
      Personajes
    </button>
  </nav>
</div>
<script src="js/data.js"></script>
<script src="js/notifications.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
